# t4_reference profile descriptor.
#
# Reference profile for the t4_tiered_haircut_margin_3pool model — three
# collateral pools (loan / margin / portfolio-margin), each with its own
# tiered (piecewise-linear) haircut curve per asset. Mirrors the
# Binance-style cross-margin formulation.
#
# Status: synthetic reference, NOT a real customer integration. Drives
# the T4 path of the multi-model smoke harness. When a real T4 customer
# is confirmed (e.g. Binance or another exchange using the same three-
# pool model), copy + amend catalog + asset_capacity + batch_shapes.
#
# Post-R10 input contract: zkpor consumes model-standard canonical CSV
# files, not raw exchange exports. The operator/preprocessor is
# responsible for producing T4 standard accounts.csv, cex_assets.csv,
# and tier_ratios.csv before services start.

[profile]
name = "t4_reference"
model = "t4_tiered_haircut_margin_3pool"
asset_capacity = 500

[identity]
scheme = "passthrough_hex_bn254_reduced.v0"

[insolvent]
# G17 registry key: "<id>.v<version>". "drop_and_log.v0" is the
# engine-default policy registered by core/host (R8-A).
action = "drop_and_log.v0"

[constraint]
module = ""  # NoExtensionID — noop

[snapshot]
# G18 registry key for canonical T4 standard CSV.
source_type = "t4_standard_csv.v1"
user_data_dir = "/server/standard-data/<snapshot_id>"
snapshot_id = "<set per snapshot>"

[snapshot.format]
null_values = ["", "NA", "null"]

[[batch_shapes]]
asset_count_tier = 50
users_per_batch = 700

[[batch_shapes]]
asset_count_tier = 500
users_per_batch = 92

[pricing]
default_price_scale = 100000000        # 1e8
default_balance_scale = 100000000      # 1e8
two_digit_assets = [
  "bttc", "shib", "lunc", "xec", "win", "bidr", "spell", "hot",
  "doge", "pepe", "floki", "idrt", "dogs", "bonk", "1000sats",
  "neiro", "1000pepper", "not", "nft", "bome", "1mbabydoge",
  "hmstr", "wlfi", "pump", "monky", "1000cheems", "idr",
]
two_digit_price_scale = 100000000000000   # 1e14
two_digit_balance_scale = 100             # 1e2

[catalog]
# In production the committed asset order is derived from cex_assets.csv.
# This list is a publishable reference for auditors and verifier-side
# users. Leave empty if the operator prefers snapshot-only ordering.
symbols = []
