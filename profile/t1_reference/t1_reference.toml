# t1_reference profile descriptor.
#
# Hypothetical reference profile for the t1_simple_margin model — spot-
# only or simple-margin with no risk-weighted collateral (vs T2's
# static haircut, T3's 1-pool tiered curve, T4's 3-pool tiered curve).
#
# Status: synthetic reference, NOT a real customer integration. Drives
# the T1 path of the multi-model smoke harness. When a real spot/simple-
# margin customer is confirmed (e.g. an SEA exchange like Indodax /
# Tokocrypto / Pintu / Bitkub), copy this file under that customer's
# name and amend catalog + asset_capacity + batch_shapes.
#
# Post-R10 input contract: zkpor consumes T1 standard canonical CSV
# (accounts.csv + cex_assets.csv).

[profile]
name = "t1_reference"
model = "t1_simple_margin"
asset_capacity = 50

[identity]
# Engine-universal scheme.
scheme = "passthrough_hex_bn254_reduced.v0"

[insolvent]
# G17 registry key "drop_and_log.v0" — engine-default policy (R8-A).
action = "drop_and_log.v0"

[constraint]
module = ""  # noop

[snapshot]
# G18 registry key for canonical T1 standard CSV.
source_type = "t1_standard_csv.v1"
user_data_dir = "/standard-data/<snapshot_id>"
snapshot_id = "<set per snapshot>"

[snapshot.format]
null_values = ["", "NA", "null"]

[[batch_shapes]]
asset_count_tier = 50
users_per_batch = 1000

[pricing]
default_price_scale = 100000000        # 1e8
default_balance_scale = 100000000      # 1e8
# No two_digit_assets — t1_reference profile is uniform-scale.

[catalog]
# Indicative spot/simple-margin major-asset list; the actual committed
# order is taken from canonical cex_assets.csv.
symbols = ["btc", "eth", "usdt", "usdc", "bnb"]
