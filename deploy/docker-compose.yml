# zkpor smoke fixture — single MySQL container the end-to-end sample-data
# smoke needs to land in. Tree backend is memory (in-process), so no
# kvrocks/Redis container is required. Production deployments that need
# witness DB resume or multi-instance scaling layer their own redis on
# top — out of scope here.
#
#   docker compose -f zkpor/deploy/docker-compose.yml up -d
#   docker compose -f zkpor/deploy/docker-compose.yml down -v
#
# The MySQL DSN service configs reference:
#   zkpor:zkpor@123@tcp(127.0.0.1:3306)/zkpor?parseTime=true

services:
  mysql:
    image: mysql:8.0
    container_name: zkpor-smoke-mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: zkpor@123
      MYSQL_DATABASE: zkpor
      MYSQL_USER: zkpor
      MYSQL_PASSWORD: zkpor@123
    command:
      - --max-execution-time=10000
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-pzkpor@123"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  mysql-data:
    name: zkpor-smoke-mysql-data
